<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — ProposalAI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">ProposalAI</div>
      <form method="POST" action="/login">
        <div class="form-group" style="margin-bottom:14px;">
          <label>아이디</label>
          <input type="text" name="username" placeholder="아이디 입력" autofocus autocomplete="username">
        </div>
        <div class="form-group" style="margin-bottom:18px;">
          <label>비밀번호</label>
          <input type="password" name="password" placeholder="비밀번호 입력" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">로그인</button>
        {% if error %}
        <p class="login-error">{{ error }}</p>
        {% endif %}
      </form>
    </div>
  </div>
</body>
</html>
