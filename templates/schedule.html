{% extends "base.html" %}
{% block title %}일정 — Prointerz{% endblock %}
{% block head %}
<style>
.sch-wrap{max-width:1200px;margin:0 auto;padding:20px 16px}
.sch-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.sch-title{font-size:20px;font-weight:700;}
.view-btns{display:flex;gap:4px;}
.view-btn{padding:7px 14px;border:1px solid #e5e7eb;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#6b7280;transition:all .15s;}
.view-btn.active{background:#4f46e5;color:#fff;border-color:#4f46e5;}
.nav-row{display:flex;align-items:center;gap:8px;}
.nav-btn{padding:6px 12px;border:1px solid #e5e7eb;border-radius:7px;font-size:13px;cursor:pointer;background:#fff;color:#374151;}
.nav-btn:hover{background:#f3f4f6;}
.nav-month{font-size:16px;font-weight:700;min-width:120px;text-align:center;}

/* 캘린더 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e5e7eb;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;}
.cal-dh{background:#f3f4f6;padding:8px;text-align:center;font-size:12px;font-weight:700;color:#6b7280;}
.cal-cell{background:#fff;min-height:90px;padding:5px 6px;vertical-align:top;}
.cal-cell.other-month{background:#f9fafb;}
.cal-cell.today{background:#eff6ff;}
.cal-day{font-size:12px;font-weight:600;color:#374151;margin-bottom:3px;}
.cal-cell.today .cal-day{color:#4f46e5;font-weight:800;}
.cal-event{font-size:11px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;max-width:100%;display:block;}
.ev-deadline{background:#fee2e2;color:#dc2626;}
.ev-deadline.urgent{background:#dc2626;color:#fff;font-weight:700;}
.ev-submit{background:#fef9c3;color:#854d0e;}
.ev-schedule{background:#dbeafe;color:#1e40af;}
.ev-done{background:#d1fae5;color:#065f46;}
.cal-more{font-size:10px;color:#9ca3af;cursor:pointer;padding:1px 4px;}

/* 타임라인 */
.tl-wrap{overflow-x:auto;}
.tl-table{border-collapse:collapse;min-width:100%;}
.tl-label{padding:8px 12px;font-size:12px;font-weight:600;white-space:nowrap;border-bottom:1px solid #e5e7eb;min-width:160px;max-width:200px;background:#f9fafb;position:sticky;left:0;z-index:2;}
.tl-head-day{padding:6px 2px;text-align:center;font-size:11px;width:28px;min-width:28px;border-bottom:1px solid #e5e7eb;color:#6b7280;background:#f3f4f6;}
.tl-head-day.today-col{color:#4f46e5;font-weight:800;background:#eff6ff;}
.tl-cell{position:relative;border-bottom:1px solid #f3f4f6;height:34px;width:28px;min-width:28px;}
.tl-bar{position:absolute;top:6px;height:22px;border-radius:4px;font-size:10px;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:3px 5px;cursor:pointer;z-index:1;}
.tl-today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:3;pointer-events:none;}

/* 리스트 */
.list-date-group{margin-bottom:20px;}
.list-date-label{font-size:13px;font-weight:700;color:#374151;padding:6px 0;border-bottom:2px solid #e5e7eb;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.list-date-label.past{color:#9ca3af;}
.list-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:4px;background:#fff;border:1px solid #e5e7eb;cursor:pointer;transition:box-shadow .15s;}
.list-item:hover{box-shadow:0 2px 6px rgba(0,0,0,.08);}
.list-item.past{opacity:.55;}
.list-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.list-nm{font-size:13px;font-weight:600;color:#111827;flex:1;}
.list-instt{font-size:12px;color:#6b7280;}
.list-type{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:600;white-space:nowrap;}
.list-assignee{font-size:12px;color:#6b7280;white-space:nowrap;}

.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:10px;height:10px;border-radius:3px;}
</style>
{% endblock %}
{% block content %}
<div class="sch-wrap">
  <div class="sch-top">
    <div class="sch-title">📅 일정</div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <div class="nav-row">
        <button class="nav-btn" onclick="prevMonth()">‹ 이전</button>
        <span class="nav-month" id="nav-month-label"></span>
        <button class="nav-btn" onclick="nextMonth()">다음 ›</button>
        <button class="nav-btn" onclick="goToday()">오늘</button>
      </div>
      <div class="view-btns">
        <button class="view-btn active" id="btn-cal" onclick="switchView('cal')">📅 캘린더</button>
        <button class="view-btn" id="btn-tl" onclick="switchView('tl')">📊 타임라인</button>
        <button class="view-btn" id="btn-list" onclick="switchView('list')">📋 리스트</button>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#dc2626;"></div>입찰 마감</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b;"></div>제출 마감</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6;"></div>일정 항목</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981;"></div>완료</div>
  </div>

  <div id="view-cal"></div>
  <div id="view-tl" style="display:none;"></div>
  <div id="view-list" style="display:none;"></div>
</div>

<script>
// ── 서버 데이터 ──────────────────────────────
const CONFIRMED = {{ confirmed | tojson }};
const SCHEDULES = {{ schedules | tojson }};

// ── 이벤트 빌드 ─────────────────────────────
const EVENTS = [];
CONFIRMED.forEach(c => {
  const clse = (c.bid_clse_dt || '').slice(0, 10);
  if (clse) EVENTS.push({date: clse, type: 'deadline', title: c.bid_ntce_nm || '확정공고', confirmed_id: c.id, assignee: c.assignee || '', instt: c.ntce_instt_nm || ''});
  const sub = (c.submit_deadline || '').slice(0, 10);
  if (sub) EVENTS.push({date: sub, type: 'submit', title: c.bid_ntce_nm || '확정공고', confirmed_id: c.id, assignee: c.assignee || '', instt: c.ntce_instt_nm || ''});
});
SCHEDULES.forEach(s => {
  const d = (s.due_date || '').slice(0, 10);
  if (d) EVENTS.push({date: d, type: s.status === '완료' ? 'done' : 'schedule', title: `${s.task_name} (${s.bid_ntce_nm || ''})`, confirmed_id: s.confirmed_id, assignee: s.assignee || '', status: s.status || ''});
});

// ── 현재 상태 ────────────────────────────────
const TODAY = new Date().toISOString().slice(0, 10);
let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth(); // 0-indexed
let curView  = 'cal';

// ── 뷰 전환 ──────────────────────────────────
function switchView(v) {
  curView = v;
  ['cal','tl','list'].forEach(x => {
    document.getElementById('view-'+x).style.display = x === v ? '' : 'none';
    document.getElementById('btn-'+x).classList.toggle('active', x === v);
  });
  render();
}

function prevMonth(){ curMonth--; if(curMonth<0){curMonth=11;curYear--;} render(); }
function nextMonth(){ curMonth++; if(curMonth>11){curMonth=0;curYear++;} render(); }
function goToday(){ const t=new Date(); curYear=t.getFullYear(); curMonth=t.getMonth(); render(); }

function updateMonthLabel(){
  document.getElementById('nav-month-label').textContent =
    `${curYear}년 ${String(curMonth+1).padStart(2,'0')}월`;
}

function render(){
  updateMonthLabel();
  if(curView==='cal')  renderCal();
  if(curView==='tl')   renderTimeline();
  if(curView==='list') renderList();
}

// ── 캘린더 ───────────────────────────────────
function renderCal(){
  const el = document.getElementById('view-cal');
  const days = ['일','월','화','수','목','금','토'];
  let html = '<div class="cal-grid">';
  days.forEach(d => html += `<div class="cal-dh">${d}</div>`);

  const first  = new Date(curYear, curMonth, 1);
  const last   = new Date(curYear, curMonth+1, 0);
  const startWd = first.getDay();

  // 이전 달 빈칸
  for(let i=0;i<startWd;i++){
    const d = new Date(curYear, curMonth, -startWd+i+1);
    html += `<div class="cal-cell other-month"><div class="cal-day" style="color:#d1d5db;">${d.getDate()}</div></div>`;
  }

  for(let day=1;day<=last.getDate();day++){
    const ds  = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = ds === TODAY;
    const evs = EVENTS.filter(e=>e.date===ds);
    const show = evs.slice(0,3);
    const more = evs.length - show.length;
    html += `<div class="cal-cell${isToday?' today':''}">`;
    html += `<div class="cal-day">${day}</div>`;
    show.forEach(e=>{
      const urgent = e.type==='deadline' && dayDiff(ds,TODAY)<= 3 && ds>=TODAY;
      const cls = e.type==='done'?'ev-done':e.type==='submit'?'ev-submit':e.type==='schedule'?'ev-schedule':`ev-deadline${urgent?' urgent':''}`;
      html += `<span class="cal-event ${cls}" onclick="location.href='/nara/confirmed/${e.confirmed_id}'" title="${_hesc(e.title)}">${_hesc(e.title)}</span>`;
    });
    if(more>0) html += `<div class="cal-more">+${more}개 더</div>`;
    html += '</div>';
  }
  // 나머지 빈칸
  const remaining = (7 - (startWd + last.getDate()) % 7) % 7;
  for(let i=1;i<=remaining;i++){
    html += `<div class="cal-cell other-month"><div class="cal-day" style="color:#d1d5db;">${i}</div></div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// ── 타임라인 ─────────────────────────────────
function renderTimeline(){
  const el = document.getElementById('view-tl');
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const todayD = new Date().getDate();
  const isCurMonth = curYear===new Date().getFullYear() && curMonth===new Date().getMonth();

  let headHtml = '<tr><th class="tl-label" style="background:#f3f4f6;">과업명</th>';
  for(let d=1;d<=daysInMonth;d++){
    const isToday = isCurMonth && d===todayD;
    headHtml += `<th class="tl-head-day${isToday?' today-col':''}">${d}</th>`;
  }
  headHtml += '</tr>';

  let bodyHtml = '';
  CONFIRMED.forEach(c=>{
    const clse = (c.bid_clse_dt||'').slice(0,10);
    const start = (c.created_at||'').slice(0,10);
    const nm    = c.bid_ntce_nm || `확정#${c.id}`;
    bodyHtml += `<tr><td class="tl-label" title="${_hesc(nm)}"><a href="/nara/confirmed/${c.id}" style="color:#2563eb;text-decoration:none;font-size:12px;">${_hesc(nm.slice(0,20))}</a></td>`;

    for(let d=1;d<=daysInMonth;d++){
      const ds = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      bodyHtml += `<td class="tl-cell" style="position:relative;">`;
      // 기간 막대 (확정일~마감일)
      if(clse && start) {
        const barStart = new Date(start), barEnd = new Date(clse);
        const cellDate = new Date(ds);
        if(cellDate >= barStart && cellDate <= barEnd){
          const isFirst = ds === start || d===1;
          const isLast  = ds === clse || d===daysInMonth;
          const urgent  = dayDiff(clse, TODAY)<=3 && clse>=TODAY;
          const bg = urgent ? '#dc2626' : '#6366f1';
          const br = `border-radius:${isFirst?'4px':0} ${isLast?'4px':0} ${isLast?'4px':0} ${isFirst?'4px':0}`;
          bodyHtml += `<div style="position:absolute;top:6px;left:0;right:0;height:22px;background:${bg};${br};opacity:.8;"></div>`;
          if(isFirst) bodyHtml += `<div style="position:absolute;top:9px;left:4px;right:2px;font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;z-index:2;">${_hesc(nm.slice(0,12))}</div>`;
        }
      }
      // 오늘 세로선
      if(isCurMonth && d===todayD) bodyHtml += `<div class="tl-today-line"></div>`;
      bodyHtml += '</td>';
    }
    bodyHtml += '</tr>';
  });

  if(!CONFIRMED.length) bodyHtml = `<tr><td colspan="${daysInMonth+1}" style="padding:40px;text-align:center;color:#9ca3af;font-size:13px;">확정된 과업이 없습니다</td></tr>`;

  el.innerHTML = `<div class="tl-wrap"><table class="tl-table"><thead>${headHtml}</thead><tbody>${bodyHtml}</tbody></table></div>`;
}

// ── 리스트 ───────────────────────────────────
function renderList(){
  const el = document.getElementById('view-list');
  if(!EVENTS.length){ el.innerHTML='<div style="text-align:center;padding:60px;color:#9ca3af;font-size:14px;">일정이 없습니다</div>'; return; }

  const sorted = [...EVENTS].sort((a,b)=>a.date.localeCompare(b.date));
  const groups = {};
  sorted.forEach(e=>{ (groups[e.date]=groups[e.date]||[]).push(e); });

  const typeLabel = {deadline:'입찰 마감',submit:'제출 마감',schedule:'일정',done:'완료'};
  const typeBg    = {deadline:'#fee2e2',submit:'#fef9c3',schedule:'#dbeafe',done:'#d1fae5'};
  const typeColor = {deadline:'#dc2626',submit:'#b45309',schedule:'#1e40af',done:'#065f46'};
  const dotColor  = {deadline:'#dc2626',submit:'#f59e0b',schedule:'#3b82f6',done:'#10b981'};

  let html = '';
  Object.keys(groups).sort().forEach(date=>{
    const isPast = date < TODAY;
    const isToday= date === TODAY;
    html += `<div class="list-date-group">`;
    html += `<div class="list-date-label${isPast?' past':''}">`;
    if(isToday) html += `<span style="background:#4f46e5;color:#fff;border-radius:5px;padding:1px 7px;font-size:11px;">오늘</span>`;
    html += `${date}`;
    html += `</div>`;
    groups[date].forEach(e=>{
      const urgent = e.type==='deadline' && dayDiff(date,TODAY)<=3 && date>=TODAY;
      html += `<div class="list-item${isPast?' past':''}" onclick="location.href='/nara/confirmed/${e.confirmed_id}'">`;
      html += `<div class="list-dot" style="background:${dotColor[e.type]||'#9ca3af'};${urgent?'animation:pulse 1s infinite':''}"></div>`;
      html += `<div class="list-nm">${_hesc(e.title)}</div>`;
      html += `<div class="list-instt">${_hesc(e.instt||'')}</div>`;
      html += `<span class="list-type" style="background:${typeBg[e.type]};color:${typeColor[e.type]};">${typeLabel[e.type]||e.type}${urgent?' 🔴':''}</span>`;
      if(e.assignee) html += `<div class="list-assignee">👤 ${_hesc(e.assignee)}</div>`;
      html += '</div>';
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

// ── 유틸 ─────────────────────────────────────
function dayDiff(dateStr, baseStr){
  return Math.round((new Date(dateStr)-new Date(baseStr))/(1000*60*60*24));
}
function _hesc(s){ return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 초기 렌더
render();
</script>
{% endblock %}
